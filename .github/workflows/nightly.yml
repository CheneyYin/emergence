name: Nightly

on:
  schedule:
    - cron: "37 3 * * *"   # 每天 03:37 UTC
  workflow_dispatch:        # 允许手动触发

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: emergence
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: emergence
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: emergence
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: emergence.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: rename artifact
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          mv ${{ matrix.artifact }} emergence-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: emergence-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/emergence-${{ matrix.target }}

  release:
    name: release nightly
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: set timestamp
        run: echo "TS=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_ENV

      - name: create nightly release
        uses: softprops/action-gh-release@v2
        with:
          name: Nightly Build (${{ env.TS }})
          tag_name: nightly-${{ env.TS }}
          prerelease: true
          body: |
            每日自动构建，基于 `master` 分支最新提交。

            **Commit:** ${{ github.sha }}
            **UTC 时间:** ${{ env.TS }}
          files: emergence-*/emergence-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
